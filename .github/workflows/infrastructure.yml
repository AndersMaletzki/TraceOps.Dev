name: Infrastructure

on:
  pull_request:
    paths:
      - '.github/workflows/infrastructure.yml'
      - 'infra/**'
  workflow_call:
    inputs:
      deploy:
        required: false
        type: boolean
        default: false
    outputs:
      function_app_name:
        description: 'Deployed Function App name'
        value: ${{ jobs.deploy.outputs.function_app_name }}
      resource_group_name:
        description: 'Deployed resource group name'
        value: ${{ jobs.deploy.outputs.resource_group_name }}
      app_deployment_client_id:
        description: 'App deployment identity client ID for AZURE_CLIENT_ID'
        value: ${{ jobs.deploy.outputs.app_deployment_client_id }}
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy infrastructure'
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: infrastructure-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate and preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Azure infra login secrets
        env:
          AZURE_INFRA_CLIENT_ID: ${{ secrets.AZURE_INFRA_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          test -n "$AZURE_INFRA_CLIENT_ID" || { echo "::error::Missing repository secret AZURE_INFRA_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "::error::Missing repository secret AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "::error::Missing repository secret AZURE_SUBSCRIPTION_ID"; exit 1; }

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_INFRA_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep build
        run: |
          az bicep build --file infra/github-identities/main.bicep
          az bicep build --file infra/workload/main.bicep

      - name: GitHub identities what-if
        run: >
          az deployment sub what-if
          --location westeurope
          --template-file infra/github-identities/main.bicep
          --parameters
          environmentName=prod
          githubOwner=AndersMaletzki
          repositoryName=TraceOps.Dev

      - name: Workload what-if
        run: >
          az deployment sub what-if
          --location westeurope
          --template-file infra/workload/main.bicep
          --parameters
          resourceGroupName=rg-traceops-prod
          environmentName=prod
          traceOpsApiKey='${{ secrets.TRACEOPS_API_KEY }}'

  approve-production:
    name: Approve production
    if: ${{ inputs.deploy == true || github.event.inputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    steps:
      - name: Await production approval
        run: |
          :

  deploy:
    name: Deploy
    if: ${{ inputs.deploy == true || github.event.inputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    needs: [validate, approve-production]
    outputs:
      function_app_name: ${{ steps.deploy.outputs.functionAppName }}
      resource_group_name: ${{ steps.deploy.outputs.resourceGroup }}
      app_deployment_client_id: ${{ steps.identity_deploy.outputs.appDeployClientId }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Azure infra login secrets
        env:
          AZURE_INFRA_CLIENT_ID: ${{ secrets.AZURE_INFRA_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          test -n "$AZURE_INFRA_CLIENT_ID" || { echo "::error::Missing repository secret AZURE_INFRA_CLIENT_ID"; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "::error::Missing repository secret AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "::error::Missing repository secret AZURE_SUBSCRIPTION_ID"; exit 1; }

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_INFRA_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy GitHub app deployment identity
        id: identity_deploy
        run: |
          set -euo pipefail
          az deployment sub create \
            --name traceops-github-identities \
            --location westeurope \
            --template-file infra/github-identities/main.bicep \
            --parameters \
            environmentName=prod \
            githubOwner=AndersMaletzki \
            repositoryName=TraceOps.Dev

          outputs="$(az deployment sub show --name traceops-github-identities --query properties.outputs -o json)"
          app_deploy_client_id="$(echo "$outputs" | jq -r '.appDeployClientId.value')"
          app_deploy_principal_object_id="$(echo "$outputs" | jq -r '.appDeployPrincipalObjectId.value')"
          echo "appDeployClientId=$app_deploy_client_id" >> "$GITHUB_OUTPUT"
          echo "appDeployPrincipalObjectId=$app_deploy_principal_object_id" >> "$GITHUB_OUTPUT"
          echo "::notice title=AZURE_CLIENT_ID::Set repository secret AZURE_CLIENT_ID to $app_deploy_client_id before running app deployment."

      - name: Deploy
        id: deploy
        run: |
          set -euo pipefail
          az deployment sub create \
            --name traceops-workload \
            --location westeurope \
            --template-file infra/workload/main.bicep \
            --parameters \
            resourceGroupName=rg-traceops-prod \
            environmentName=prod \
            traceOpsApiKey='${{ secrets.TRACEOPS_API_KEY }}' \
            appDeploymentPrincipalObjectId='${{ steps.identity_deploy.outputs.appDeployPrincipalObjectId }}'

          outputs="$(az deployment sub show --name traceops-workload --query properties.outputs -o json)"
          echo "functionAppName=$(echo "$outputs" | jq -r '.functionAppName.value')" >> "$GITHUB_OUTPUT"
          echo "resourceGroup=$(echo "$outputs" | jq -r '.resourceGroup.value')" >> "$GITHUB_OUTPUT"
