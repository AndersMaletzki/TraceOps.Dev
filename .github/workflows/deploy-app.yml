name: Deploy App

on:
  workflow_call:
    inputs:
      function_app_name:
        required: true
        type: string
      resource_group_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      function_app_name:
        required: true
        type: string
      resource_group_name:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Install API production dependencies
        run: npm ci --omit=dev --workspace @traceops/api --include-workspace-root=false

      - name: Validate Azure app login secrets
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          test -n "$AZURE_CLIENT_ID" || { echo "::error::Missing repository secret AZURE_CLIENT_ID. Run the infrastructure deployment and store its appDeployClientId output as AZURE_CLIENT_ID."; exit 1; }
          test -n "$AZURE_TENANT_ID" || { echo "::error::Missing repository secret AZURE_TENANT_ID"; exit 1; }
          test -n "$AZURE_SUBSCRIPTION_ID" || { echo "::error::Missing repository secret AZURE_SUBSCRIPTION_ID"; exit 1; }

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Assemble API deployment package
        run: |
          set -euo pipefail
          rm -rf deploy
          mkdir deploy
          cp -R api/dist deploy/dist
          cp api/host.json deploy/host.json
          cp api/package.json deploy/package.json
          cp -R node_modules deploy/node_modules
          rm -rf deploy/node_modules/@traceops

      - name: Deploy API
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ inputs.function_app_name }}
          package: ./deploy

      - name: Restart Function App
        run: |
          set -euo pipefail
          az functionapp restart \
            --resource-group '${{ inputs.resource_group_name }}' \
            --name '${{ inputs.function_app_name }}'

      - name: Verify deployed API routes
        run: |
          set -euo pipefail

          base_url="https://${{ inputs.function_app_name }}.azurewebsites.net"
          probe_route() {
            local route="$1"
            local expected_csv="$2"
            shift 2
            local curl_args=("$@")
            local response_file
            response_file="$(mktemp)"
            local status="000"

            for attempt in {1..12}; do
              status="$(
                curl \
                  --silent \
                  --show-error \
                  --output "$response_file" \
                  --write-out "%{http_code}" \
                  "${curl_args[@]}" \
                  "${base_url}${route}"
              )"

              IFS=',' read -r -a expected_statuses <<< "$expected_csv"

              for expected_status in "${expected_statuses[@]}"; do
                if [ "$status" = "$expected_status" ]; then
                  echo "Route ${route} returned expected HTTP ${status}."
                  rm -f "$response_file"
                  return 0
                fi
              done

              if [ "$status" = "404" ]; then
                echo "Route ${route} returned HTTP 404 on attempt ${attempt}; retrying."
              elif [[ "$status" =~ ^5[0-9][0-9]$ ]]; then
                echo "Route ${route} returned HTTP ${status} on attempt ${attempt}; retrying."
              else
                echo "Route ${route} returned unexpected HTTP ${status} on attempt ${attempt}; retrying."
              fi

              sleep 10
            done

            echo "::error::Route ${route} returned HTTP ${status}; expected ${expected_csv}."
            if [ -s "$response_file" ]; then
              echo "Response body:"
              cat "$response_file"
            fi
            rm -f "$response_file"
            exit 1
          }

          probe_route "/api/app/admin/metrics/users" "401"
          probe_route "/api/app/admin/metrics/issues" "401"
          probe_route "/api/app/admin/metrics/requests" "401"
          probe_route "/api/app/workitems" "401"
