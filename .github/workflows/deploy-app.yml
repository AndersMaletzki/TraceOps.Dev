name: Deploy App

on:
  workflow_call:
    inputs:
      function_app_name:
        required: true
        type: string
      resource_group_name:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      function_app_name:
        required: true
        type: string
      resource_group_name:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Install API production dependencies
        run: npm ci --omit=dev --workspace @traceops/api --include-workspace-root=false

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Package API
        run: |
          set -euo pipefail
          rm -rf api-package traceops-api.zip
          mkdir api-package
          cp -R api/dist api/host.json api/package.json node_modules api-package/
          rm -rf api-package/node_modules/@traceops
          cd api-package
          zip -r ../traceops-api.zip .

      - name: Deploy API
        run: >
          az functionapp deployment source config-zip
          --resource-group '${{ inputs.resource_group_name }}'
          --name '${{ inputs.function_app_name }}'
          --src traceops-api.zip
